kind = "web"
previewPath = "/"
title = "Mini Farm - Telegram Web App"
version = "1.0.0"
id = "artifacts/mini-farm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21041
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mini-farm run dev"

[services.env]
PORT = "21041"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mini-farm", "run", "build"]
publicDir = "artifacts/mini-farm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
